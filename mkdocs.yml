site_name: Tad Diary
theme:
  name: material
  logo: assets/logo/cat_white.png
  text: Noto Serif Medium
  code: Roboto Mono Medium
  highlightjs: true
  hljs_style: github
  hljs_style_dark: github-dark
  palette:
  - scheme: default
    primary: blue grey
    accent: pink
    toggle:
      icon: material/brightness-4
      name: Switch to dark mode
  - scheme: slate
    primary: blue grey
    accent: pink
    toggle:
      icon: material/brightness-7
      name: Switch to light mode
  features:
    - content.code.annotation
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.instant
    - navigation.footer
    - navigation.tracking

plugins:
  - search
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/

nav:
  - Diary:
    - Nhiệm Vụ: index.md
    - Lưu Trữ: debit.md
    - Năm 2025:
      - Tháng 12: 2025/2025-12.md
      - Tháng 10: 2025/2025-10.md
      - Tháng 9: 2025/2025-9.md
      - Tháng 8: 2025/2025-8.md
      - Tháng 7: 2025/2025-7.md
      - Tháng 6: 2025/2025-6.md
  - Đồ:
    - Máy Tính:
      - Bàn phím: Items/items-keyboards.md
      - Mini PC: Items/items-mini-pc.md
    - Đô Nội Thất:
      - Tủ Quần Áo: Items/items-furniture-wardrobe.md
  - Cuisine:
    - Tổng quan: Cuisine/cuisine.md
    - Thịt:
      - Gà: Cuisine/cuisine-meat-chicken.md
    - Đồ uống:
      - Trà: Cuisine/cuisine-tea.md
      - Cafe: Cuisine/cuisine-coffee.md
    - Dinh dưỡng:
      - Tổng quan: Cuisine/cuisine-nutrition.md
  - Âm Nhạc:
    - Việt Nam:
      - Pop: Music/music-vn-pop.md
      - Bolero: Music/music-vn-bolero.md
      - Indie: Music/music-vn-indie.md
      - R,R&B,E: Music/music-vn-rock-ballad-electronic.md
      - Unknow: Music/music-vn-unknow.md
    - Trung Quốc:
      - Pop: Music/music-china-pop.md
      - By Name: Music/music-china-by-name.md
      - R&B: Music/music-china-r-and-b.md
      - Playlist: Music/music-china-playlist.md
      - Another: Music/music-china-another.md
    - Nhật Bản:
      - Pop: Music/music-japan-pop.md
    - EU:
      - Pop: Music/music-eu-pop.md
      - Dj & Elec.: Music/music-eu-dj-electronic.md
      - Epic: Music/music-eu-epic.md
      - Old: Music/music-eu-old.md
      - Cover: Music/music-eu-cover.md
      - Playlist: Music/music-eu-playlist.md
    - Các nước khác:
      - Đức: Music/music-germany.md
    - Nhạc Điện Tử:
      - Misc 1: Music/music-misc-electronic.md
  - Phim:
    - Mỹ: Movie/movie-america.md
    - Trung Quốc: Movie/movie-china.md
  - Y Tế:
    - Y Tế: Medical/medical.md
  - Gia Đình:
    - Họ Nội: Family/family-paternal-side.md
    - Họ Ngoại: Family/family-maternal-side.md
  - Khác:
    - TÍCH LŨY TƯ BẢN NGUYÊN THỦY: Another/paper-tich-luy-tu-ban-nguyen-thuy.md
    - Lagom - Vừa Đủ: Another/idea-lagom.md

extra_css:
  - assets/stylesheets/theme.css
  - assets/stylesheets/katex.min.css

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

extra_javascript:
  - assets/scripts/tablesort.min.js
  - assets/scripts/tablesort.js
  - assets/scripts/katex.js
  - assets/scripts/keyevent.js
  - assets/scripts/katex.min.js
  - assets/scripts/auto-render.min.js

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/dothanhdathp
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/tad.zeila?locale=vi_VN